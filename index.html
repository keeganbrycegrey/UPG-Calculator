<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPG Calculator — UPCAT Estimator</title>
<meta name="description" content="Estimate your University of the Philippines University Predicted Grade (UPG) from your UPCAT scores and high school grades. Unofficial, for reference only.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --maroon: #7B1C2E; --maroon-deep: #4A0D1A; --maroon-light: #B5364D;
    --maroon-muted: #9B2D40; --cream: #F5EFE6; --gold: #C9A84C;
    --bg: #0F0A0C; --bg-card: #1A1114; --bg-surface: #221620; --bg-input: #2A1B22;
    --text: #F0E8E0; --text-muted: #9E8A85; --text-dim: #6B5A57;
    --border: rgba(200,150,150,0.12); --border-hover: rgba(200,150,150,0.25);
    --success: #4CAF82; --warning: #E2A84C; --danger: #E25C5C; --info: #5CA8E2;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-weight: 300;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 2rem 1rem 4rem;
  }
  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.5;
  }
  .page { position: relative; z-index: 1; width: 100%; max-width: 680px; }
 
  /* Header */
  header { text-align: center; margin-bottom: 3rem; padding-top: 1rem; }
  .eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; opacity: 0.85; }
  h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2.2rem, 6vw, 3.2rem); font-weight: 400; color: var(--cream); line-height: 1.1; }
  h1 span { color: var(--maroon-light); }
  .header-sub { margin-top: 0.75rem; font-size: 14px; color: var(--text-muted); line-height: 1.6; }
 
  /* Cards */
  .card { background: var(--bg-card); border: 0.5px solid var(--border); border-radius: 16px; padding: 1.75rem; margin-bottom: 1rem; transition: border-color 0.2s; animation: fadeUp 0.4s ease both; }
  .card:hover { border-color: var(--border-hover); }
  .card:nth-child(2) { animation-delay: 0.04s; }
  .card:nth-child(3) { animation-delay: 0.08s; }
  .card:nth-child(4) { animation-delay: 0.12s; }
  .card:nth-child(5) { animation-delay: 0.16s; }
  .card-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 1.25rem; }
